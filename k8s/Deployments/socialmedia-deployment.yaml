apiVersion: apps/v1
kind: Deployment
metadata:
  name: social-media-app
  namespace: socialmedia
  labels:
    app: social-media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: social-media
  template:
    metadata:
      labels:
        app: social-media
    spec:
      containers:
      - name: social-media-app
        image: shrikov/social-media-app:v1
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        env:
        - name: DJANGO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: social-secrets
              key: secret-key
        - name: DEBUG
          value: "False"
        - name: ALLOWED_HOSTS
          value: "social-media.local,localhost,127.0.0.1,redhat-2,192.168.49.2,10.0.0.131,*"
        - name: DB_NAME
          value: "socialmedia"
        - name: DB_USER
          value: "django"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: social-secrets
              key: db-password
        - name: DB_HOST
          value: "postgres-service"
        - name: DB_PORT
          value: "5432"
        - name: MEDIA_ROOT
          value: /app/media
        - name: STATIC_ROOT
          value: /app/staticfiles
        volumeMounts:
        - name: media-storage
          mountPath: /app/media
        - name: static-storage
          mountPath: /app/staticfiles
      volumes:
      - name: media-storage
        persistentVolumeClaim:
          claimName: media-pvc
      - name: static-storage
        persistentVolumeClaim:
          claimName: static-pvc


